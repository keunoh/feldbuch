services:
  mysql:
    image: mysql:8.4
    container_name: feldbuch-mysql

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: feldbuch
      MYSQL_USER: feldbuch
      MYSQL_PASSWORD: feldbuch

    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.2-alpine
    container_name: feldbuch-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:

