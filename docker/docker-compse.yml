services:
  mysql:
    image: mysql:8.4
    container_name: feldbuch-mysql

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: feldbuch
      MYSQL_USER: feldbuch
      MYSQL_PASSWORD: feldbuch

    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:

