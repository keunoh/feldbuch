<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">Feldbuch Project Architecture Diagram</title>
  <desc id="desc">Architecture diagram for the current Feldbuch backend project using Java, Spring Boot, Spring Security, JWT, QueryDSL, JPA, MySQL, H2, Docker, Gradle, and OpenAI.</desc>
  <defs>
    <style>
      .title { font: 700 28px Arial, Helvetica, sans-serif; fill: #111827; }
      .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #111827; }
      .small { font: 500 14px Arial, Helvetica, sans-serif; fill: #374151; }
      .box { fill: #fff; stroke: #d1d5db; stroke-width: 2; }
      .group { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .app { fill: #ecfdf5; stroke: #22c55e; stroke-width: 3; }
      .ai { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 2; }
      .data { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; }
      .build { fill: #fff7ed; stroke: #f97316; stroke-width: 2; }
      .arrow { stroke: #374151; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .green { stroke: #16a34a; }
      .purple { stroke: #7c3aed; }
      .blue { stroke: #2563eb; }
      .orange { stroke: #ea580c; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>

  <rect width="1120" height="640" fill="#ffffff"/>
  <text x="40" y="50" class="title">Feldbuch Project Architecture</text>
  <text x="40" y="80" class="small">Project URL placeholder: https://io.github.kaltz.feldbuch.local</text>

  <rect x="44" y="132" width="190" height="92" rx="18" class="box"/>
  <text x="139" y="170" text-anchor="middle" class="label">Client</text>
  <text x="139" y="196" text-anchor="middle" class="small">REST API Consumer</text>

  <rect x="300" y="104" width="500" height="386" rx="26" class="app"/>
  <text x="550" y="138" text-anchor="middle" class="label">Spring Boot Application</text>
  <text x="550" y="164" text-anchor="middle" class="small">Java 21 / Gradle / Spring Boot 3</text>

  <rect x="332" y="196" width="172" height="78" rx="16" class="group"/>
  <text x="418" y="228" text-anchor="middle" class="label">Spring Security</text>
  <text x="418" y="252" text-anchor="middle" class="small">JWT Filter</text>

  <rect x="574" y="196" width="172" height="78" rx="16" class="group"/>
  <text x="660" y="228" text-anchor="middle" class="label">Controller</text>
  <text x="660" y="252" text-anchor="middle" class="small">Auth / Note / AI</text>

  <rect x="332" y="320" width="172" height="78" rx="16" class="group"/>
  <text x="418" y="352" text-anchor="middle" class="label">Service Layer</text>
  <text x="418" y="376" text-anchor="middle" class="small">CQRS / Facade / Async</text>

  <rect x="574" y="320" width="172" height="78" rx="16" class="group"/>
  <text x="660" y="352" text-anchor="middle" class="label">Reader / Mapper</text>
  <text x="660" y="376" text-anchor="middle" class="small">Repository Boundary</text>

  <path d="M234 178h66" class="arrow green"/>
  <path d="M504 235h70" class="arrow green"/>
  <path d="M660 274v46" class="arrow green"/>
  <path d="M574 359h-70" class="arrow green"/>

  <rect x="860" y="124" width="202" height="132" rx="20" class="data"/>
  <text x="961" y="164" text-anchor="middle" class="label">Persistence</text>
  <text x="961" y="192" text-anchor="middle" class="small">Spring Data JPA</text>
  <text x="961" y="218" text-anchor="middle" class="small">QueryDSL</text>
  <text x="961" y="244" text-anchor="middle" class="small">MySQL / H2 Test DB</text>
  <path d="M746 360c72 0 58-170 114-170" class="arrow blue"/>

  <rect x="860" y="306" width="202" height="104" rx="20" class="ai"/>
  <text x="961" y="346" text-anchor="middle" class="label">OpenAI API</text>
  <text x="961" y="374" text-anchor="middle" class="small">RestClient</text>
  <text x="961" y="398" text-anchor="middle" class="small">AI Summary</text>
  <path d="M746 359h114" class="arrow purple"/>

  <rect x="300" y="532" width="500" height="70" rx="20" class="build"/>
  <text x="550" y="562" text-anchor="middle" class="label">Build &amp; Local Runtime</text>
  <text x="550" y="588" text-anchor="middle" class="small">Gradle Wrapper / Docker Compose / .env Configuration</text>
  <path d="M550 532v-42" class="arrow orange"/>
</svg>
