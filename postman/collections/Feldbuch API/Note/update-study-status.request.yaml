$kind: http-request
name: Update Study Status
method: PATCH
url: '{{baseUrl}}/api/notes/{{noteId}}/study-status'
order: 7000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: noteId
    value: '1'
body:
  type: json
  content: |-
    {
      "studyStatus": "IN_PROGRESS"
    }
