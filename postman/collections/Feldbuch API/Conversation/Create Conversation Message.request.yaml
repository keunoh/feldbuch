$kind: http-request
name: Create Conversation Message
method: POST
url: '{{baseUrl}}/api/conversations/{{conversationId}}/messages'
order: 4000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: conversationId
    value: '1'
body:
  type: json
  content: |-
    {
      "content": "안녕하세요, 질문이 있습니다."
    }