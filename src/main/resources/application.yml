spring:

  application:
    name: feldbuch

  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

openai:
  base-url: https://api.openai.com/v1
  model: gpt-4.1-nano

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    io.github.kaltz.feldbuch: DEBUG

