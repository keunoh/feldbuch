<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Feldbuch</title>

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>

<body>

<div class="app">

    <aside class="sidebar">

        <h2 class="logo">Feldbuch</h2>

        <button class="new-chat-button">
            + 새 대화
        </button>

        <div class="conversation-section">

            <h3>최근 대화</h3>

            <ul class="conversation-list">
                <li>Spring Security</li>
                <li>Docker</li>
                <li>JWT</li>
            </ul>

        </div>

    </aside>

    <main class="chat">

        <section class="welcome">

            <h1>Feldbuch</h1>

            <p>AI와 함께 생각을 기록하세요.</p>

        </section>

        <section class="messages">

        </section>

        <footer class="chat-input">

            <textarea
                    placeholder="무엇이든 질문해보세요."></textarea>

            <button>전송</button>

        </footer>

    </main>

</div>

<script th:src="@{/js/common/api.js}"></script>
<script th:src="@{/js/conversation/conversation.js}"></script>

</body>

</html>
